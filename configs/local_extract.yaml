# ============================================================================
# Local Configuration: Interaction Frame Extraction
# ============================================================================
# SAM2 centroid propagation to find close-interaction frames for YOLO retraining.
# Uses SAM2 tiny for local testing.
#
# Usage:
#   python roboflow/extract_interaction_frames.py all --config configs/local_extract.yaml
# ============================================================================

# --- Input video ---
video_path: data/clips/output-10s.mp4

# --- Output ---
output_dir: outputs/runs

# --- Models ---
models:
  yolo_path: models/yolo/best.pt
  sam2_checkpoint: models/sam2/segment-anything-2/checkpoints/sam2.1_hiera_tiny.pt
  sam2_config: configs/sam2.1/sam2.1_hiera_t.yaml
  device: auto

# --- Detection (YOLO — init frame only) ---
detection:
  confidence: 0.25
  max_animals: 2
  keypoint_names:
    - tail_tip
    - tail_base
    - tail_start
    - mid_body
    - nose
    - right_ear
    - left_ear
  keypoint_min_conf: 0.3
  filter_class: null
  nms_iou: 0.5

# --- Segmentation (SAM2) ---
segmentation:
  sam_threshold: 0.0

# --- Frame extraction ---
extract:
  max_frames: 20
  min_gap_frames: 10
  interaction_threshold_px: 200

# --- Scan limits ---
scan:
  max_frames: null
