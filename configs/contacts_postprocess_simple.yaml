# ============================================================================
# Contacts Post-Processing Configuration (Simple 3-Rule Pipeline)
# ============================================================================
# Temporal filtering to convert noisy per-frame contact labels into clean
# behavioral events. See docs/contacts_postprocess_simple.md for research basis.
#
# Usage:
#   python scripts/postprocess_contacts_simple.py path/to/contacts/
#   python scripts/postprocess_contacts_simple.py path/to/contacts/ \
#       --config configs/contacts_postprocess_simple.yaml --make_reports
#   python scripts/postprocess_contacts_simple.py path/to/contacts/ \
#       smoothing.window=7 min_bout.duration_sec=0.5
# ============================================================================

# --- Rule 1: Majority-vote smoothing ---
# Slides a window over per-frame contact labels. Each frame adopts the
# most frequent label in its window. Corrects 1-2 frame flickers.
# MARS: 3-frame average. Our 5-frame window handles isolated flickers.
smoothing:
  window: 5              # frames (must be odd). ~167ms at 30fps.

# --- Rule 2: Gap bridging ---
# If the same contact type reappears within max_gap frames of ending,
# the gap is filled and the bout continues.
# MARS: 1-3 frame FN as dominant error. JAABA: gap-fill before min-bout.
gap_bridging:
  max_gap: 3             # frames. ~100ms at 30fps.

# --- Rule 3: Minimum bout duration ---
# After smoothing and gap bridging, bouts shorter than this are removed.
# A-SOiD: 200ms floor, 400ms default. 300ms is conservative for social contacts.
min_bout:
  duration_sec: 0.3      # seconds (9 frames at 30fps).

# --- FPS fallback ---
# Used only if no --fps flag, no session_summary.json, and no --video_path.
fps_fallback: 30.0
